<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - WCAMAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Status Indicators -->
        <div class="status-indicators mt-3">
            <span class="status-indicator {% if stepca_online %}status-online{% else %}status-offline{% endif %}">
                <i class="bi bi-{% if stepca_online %}check-circle{% else %}x-circle{% endif %} me-1"></i>
                Step-CA
            </span>
            <span class="status-indicator {% if ldap_online %}status-online{% else %}status-offline{% endif %}">
                <i class="bi bi-{% if ldap_online %}check-circle{% else %}x-circle{% endif %} me-1"></i>
                LDAP
            </span>
        </div>

        <div class="login-header">
            <h3><i class="bi bi-person-plus me-2"></i>WCAMAN Register</h3>
        </div>
        
        <div class="login-body">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name (Optional)</label>
                    <input type="text" class="form-control" name="full_name">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
            </form>
            
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                    Already have an account? Login here
                </a>
                <a href="{{ url_for('main.home') }}" class="btn btn-outline-primary btn-sm">
                    Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
