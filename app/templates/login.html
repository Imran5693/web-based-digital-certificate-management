<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - WCAMAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h3><i class="bi bi-shield-lock me-2"></i>WCAMAN</h3>
            <p class="mb-0">Certificate Management</p>
        </div>
        
        <!-- Status Indicators -->
        <div class="status-indicators">
            <span class="status-indicator {% if stepca_online %}status-online{% else %}status-offline{% endif %}">
                <i class="bi bi-{% if stepca_online %}check-circle{% else %}x-circle{% endif %}"></i>
                Step-CA
            </span>
            <span class="status-indicator {% if ldap_online %}status-online{% else %}status-offline{% endif %}">
                <i class="bi bi-{% if ldap_online %}check-circle{% else %}x-circle{% endif %}"></i>
                LDAP
            </span>
        </div>

        <div class="login-body">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-triangle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %} me-2"></i>
                                <span class="small">{{ message }}</span>
                            </div>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-person text-primary"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" name="username" required autofocus placeholder="Enter username">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-lock text-primary"></i>
                        </span>
                        <input type="password" class="form-control border-start-0" name="password" required placeholder="Enter password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-2">Don't have an account?</p>
                <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-sm">
                    Register here
                </a>
                <a href="{{ url_for('main.home') }}" class="btn btn-outline-primary btn-sm">
                    Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
